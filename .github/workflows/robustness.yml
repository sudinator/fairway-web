name: Robustness

# Runs on every push/PR (i.e. every deploy to Vercel), plus daily and on-demand.
on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 13 * * *"   # 13:00 UTC daily

jobs:
  app-checks:
    name: Types, tests, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key

  schema-guard:
    name: Database schema guard (read-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends postgresql-client
      - name: Run schema guard
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: bash ci/schema-check.sh

  onepager-sync:
    name: Marketing one-pagers in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install "reportlab==4.4.10"
      - run: python3 marketing/make_onepagers.py
      - name: Fail if the capability list changed without regenerating the sheets
        run: |
          git diff --exit-code -- marketing/onepager-content.txt \
            || { echo "::error::Marketing one-pagers are stale. Run 'npm run gen:onepagers' and commit the result."; exit 1; }
